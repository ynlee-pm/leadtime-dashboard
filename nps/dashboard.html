<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NPS 대시보드 — 수강경험 주요 지표</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<style>
:root {
  --primary: #4F46E5;
  --primary-light: #818CF8;
  --bg: #F1F5F9;
  --card: #FFFFFF;
  --text: #1E293B;
  --text-muted: #64748B;
  --border: #E2E8F0;
  --green: #10B981;
  --amber: #F59E0B;
  --red: #EF4444;
  --radius: 12px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'Segoe UI','Malgun Gothic',sans-serif; background:var(--bg); color:var(--text); }

/* Header */
.header { background:var(--primary); color:#fff; padding:20px 32px; display:flex; align-items:center; gap:16px; }
.header h1 { font-size:22px; font-weight:700; }
.header span { font-size:13px; opacity:.8; }

/* Filter Bar */
.filter-bar { background:var(--card); border-bottom:1px solid var(--border); padding:14px 32px; display:flex; flex-wrap:wrap; gap:12px; align-items:center; }
.filter-bar label { font-size:13px; color:var(--text-muted); font-weight:600; }
.filter-bar select, .filter-bar input[type="date"] {
  padding:6px 10px; border:1px solid var(--border); border-radius:6px; font-size:13px;
  background:#fff; color:var(--text); min-width:140px;
}
.filter-bar button {
  padding:6px 16px; border:none; border-radius:6px; font-size:13px; cursor:pointer;
  background:var(--primary); color:#fff; font-weight:600;
}
.filter-bar button:hover { background:var(--primary-light); }
.filter-bar button.reset { background:#E2E8F0; color:var(--text); }

/* KPI Cards */
.kpi-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:16px; padding:20px 32px; }
.kpi-card {
  background:var(--card); border-radius:var(--radius); padding:20px 24px;
  box-shadow:0 1px 3px rgba(0,0,0,.06);
}
.kpi-card .label { font-size:13px; color:var(--text-muted); font-weight:600; margin-bottom:6px; }
.kpi-card .value { font-size:32px; font-weight:800; }
.kpi-card .sub { font-size:12px; color:var(--text-muted); margin-top:4px; }
.kpi-card .value.green { color:var(--green); }
.kpi-card .value.amber { color:var(--amber); }
.kpi-card .value.red { color:var(--red); }

/* Tabs */
.tabs { display:flex; gap:0; padding:0 32px; background:var(--card); border-bottom:2px solid var(--border); }
.tab-btn {
  padding:12px 24px; font-size:14px; font-weight:600; cursor:pointer;
  border:none; background:transparent; color:var(--text-muted); border-bottom:2px solid transparent;
  margin-bottom:-2px; transition:all .15s;
}
.tab-btn:hover { color:var(--text); }
.tab-btn.active { color:var(--primary); border-bottom-color:var(--primary); }

/* Tab Content */
.tab-panels { padding:20px 32px; }
.tab-panel { display:none; }
.tab-panel.active { display:block; }
.chart-grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:20px; }
.chart-card {
  background:var(--card); border-radius:var(--radius); padding:20px;
  box-shadow:0 1px 3px rgba(0,0,0,.06);
}
.chart-card h3 { font-size:15px; margin-bottom:14px; color:var(--text); }
.chart-card.full { grid-column:1/-1; }
.chart-card canvas { max-height:400px; }

/* Period Toggle */
.period-toggle { display:flex; gap:4px; margin-bottom:16px; }
.period-toggle button {
  padding:6px 16px; border:1px solid var(--border); border-radius:6px;
  background:#fff; color:var(--text-muted); font-size:13px; cursor:pointer; font-weight:600;
}
.period-toggle button.active { background:var(--primary); color:#fff; border-color:var(--primary); }

/* Table */
.data-table { width:100%; border-collapse:collapse; font-size:13px; }
.data-table th { background:var(--bg); padding:10px 12px; text-align:left; font-weight:700; border-bottom:2px solid var(--border); white-space:nowrap; }
.data-table td { padding:8px 12px; border-bottom:1px solid var(--border); }
.data-table tr:hover td { background:#F8FAFC; }
.nps-badge { display:inline-block; padding:2px 8px; border-radius:4px; font-weight:700; font-size:12px; }
.nps-badge.good { background:#D1FAE5; color:#065F46; }
.nps-badge.ok { background:#FEF3C7; color:#92400E; }
.nps-badge.bad { background:#FEE2E2; color:#991B1B; }

/* Responsive */
@media(max-width:900px) {
  .chart-grid { grid-template-columns:1fr; }
  .kpi-row { grid-template-columns:repeat(2,1fr); }
  .filter-bar { gap:8px; }
}
@media(max-width:600px) {
  .kpi-row { grid-template-columns:1fr; }
  .header { padding:16px; }
  .filter-bar, .tab-panels { padding:12px 16px; }
  .tabs { padding:0 16px; overflow-x:auto; }
}
</style>
</head>
<body>

<div class="header">
  <h1>NPS 대시보드</h1>
  <span>수강경험 주요 지표</span>
</div>

<!-- Filters -->
<div class="filter-bar">
  <label>상품</label>
  <select id="filterProduct"><option value="">전체</option></select>
  <label>연령대</label>
  <select id="filterAge"><option value="">전체</option></select>
  <label>기간</label>
  <input type="date" id="filterFrom">
  <span>~</span>
  <input type="date" id="filterTo">
  <button onclick="applyFilters()">적용</button>
  <button class="reset" onclick="resetFilters()">초기화</button>
</div>

<!-- KPIs -->
<div class="kpi-row">
  <div class="kpi-card"><div class="label">총 응답 수</div><div class="value" id="kpiTotal">—</div><div class="sub" id="kpiTotalSub"></div></div>
  <div class="kpi-card"><div class="label">NPS 점수</div><div class="value" id="kpiNps">—</div><div class="sub" id="kpiNpsSub"></div></div>
  <div class="kpi-card"><div class="label">평균 만족도</div><div class="value" id="kpiSat">—</div><div class="sub" id="kpiSatSub">/ 5.0</div></div>
  <div class="kpi-card"><div class="label">추천 비율 (Promoter)</div><div class="value green" id="kpiPromoter">—</div><div class="sub" id="kpiPromoterSub"></div></div>
</div>

<!-- Tabs -->
<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('product')">상품별</button>
  <button class="tab-btn" onclick="switchTab('period')">기간별</button>
  <button class="tab-btn" onclick="switchTab('age')">연령대별</button>
  <button class="tab-btn" onclick="switchTab('factors')">도움 요소</button>
</div>

<!-- Tab Panels -->
<div class="tab-panels">
  <!-- 상품별 -->
  <div class="tab-panel active" id="panel-product">
    <div class="chart-grid">
      <div class="chart-card"><h3>상품별 NPS 점수</h3><canvas id="chartProductNps"></canvas></div>
      <div class="chart-card"><h3>상품별 평균 만족도</h3><canvas id="chartProductSat"></canvas></div>
      <div class="chart-card full"><h3>상품별 NPS 분포 (Promoter / Passive / Detractor)</h3><canvas id="chartProductDist"></canvas></div>
      <div class="chart-card full"><h3>상품별 상세</h3><div style="overflow-x:auto" id="productTableWrap"></div></div>
    </div>
  </div>

  <!-- 기간별 -->
  <div class="tab-panel" id="panel-period">
    <div class="period-toggle">
      <button class="active" onclick="setPeriod('week',this)">주간</button>
      <button onclick="setPeriod('month',this)">월간</button>
    </div>
    <div class="chart-grid">
      <div class="chart-card"><h3>NPS 추이</h3><canvas id="chartPeriodNps"></canvas></div>
      <div class="chart-card"><h3>평균 만족도 추이</h3><canvas id="chartPeriodSat"></canvas></div>
      <div class="chart-card"><h3>응답 수 추이</h3><canvas id="chartPeriodCount"></canvas></div>
      <div class="chart-card"><h3>NPS 분포 추이</h3><canvas id="chartPeriodDist"></canvas></div>
    </div>
  </div>

  <!-- 연령대별 -->
  <div class="tab-panel" id="panel-age">
    <div class="chart-grid">
      <div class="chart-card"><h3>연령대별 NPS 점수</h3><canvas id="chartAgeNps"></canvas></div>
      <div class="chart-card"><h3>연령대별 평균 만족도</h3><canvas id="chartAgeSat"></canvas></div>
      <div class="chart-card full"><h3>연령대별 NPS 분포</h3><canvas id="chartAgeDist"></canvas></div>
    </div>
  </div>

  <!-- 도움 요소 -->
  <div class="tab-panel" id="panel-factors">
    <div class="chart-grid">
      <div class="chart-card"><h3>도움 요소 선택 빈도</h3><canvas id="chartFactorsFreq"></canvas></div>
      <div class="chart-card"><h3>도움 요소별 평균 NPS</h3><canvas id="chartFactorsNps"></canvas></div>
      <div class="chart-card full"><h3>상품별 주요 도움 요소 (Top 3)</h3><div style="overflow-x:auto" id="factorsTableWrap"></div></div>
    </div>
  </div>
</div>

// ============================================================
// DATA PARSING & HELPERS
// ============================================================
const parsed = Papa.parse(CSV_RAW, { header: true, skipEmptyLines: true });
let allData = parsed.data.map(r => {
  const age = parseInt(r['연령통합']);
  let ageGroup;
  if (age >= 10 && age <= 79) ageGroup = age + '대';
  else ageGroup = '기타';
  let factors = [];
  try { factors = JSON.parse(r.helpful_factors_options_json || '[]'); } catch(e) {}
  return {
    product: (r['상품명'] || '').trim(),
    productId: r.product_id,
    age: age,
    ageGroup: ageGroup,
    submittedAt: parseDate(r.submitted_at),
    npsScore: parseInt(r.nps_score),
    npsBucket: r.nps_bucket,
    npsReason: r.nps_reason || '',
    satisfaction: parseInt(r.learning_env_satisfaction),
    factors: factors,
    factorsCustom: r.helpful_factors_custom || ''
  };
}).filter(r => r.product && !isNaN(r.npsScore));

function parseDate(s) {
  if (!s) return null;
  const parts = s.trim().split(' ');
  const dParts = parts[0].split('/');
  const year = 2000 + parseInt(dParts[0]);
  const month = parseInt(dParts[1]) - 1;
  const day = parseInt(dParts[2]);
  return new Date(year, month, day);
}

const FACTOR_LABELS = {
  study_material: '학습 자료',
  summary_note: '요약 노트',
  ai_chatbot: 'AI 챗봇',
  feature_guide: '기능 가이드',
  code_snippet: '코드 스니펫',
  basic_practice: '기초 실습',
  puzzle: '퍼즐/퀴즈',
  custom_helpful: '기타'
};

const COLORS = {
  promoter: '#10B981',
  passive: '#F59E0B',
  detractor: '#EF4444',
  primary: '#4F46E5',
  primaryLight: '#818CF8',
  palette: ['#4F46E5','#06B6D4','#10B981','#F59E0B','#EF4444','#8B5CF6','#EC4899','#14B8A6']
};

// ============================================================
// STATE
// ============================================================
let filteredData = [...allData];
let currentPeriod = 'week';
const charts = {};

// ============================================================
// FILTER LOGIC
// ============================================================
function initFilters() {
  const products = [...new Set(allData.map(d => d.product))].sort();
  const ages = [...new Set(allData.map(d => d.ageGroup))].sort((a,b) => {
    const na = parseInt(a), nb = parseInt(b);
    if (isNaN(na)) return 1;
    if (isNaN(nb)) return -1;
    return na - nb;
  });
  const prodSel = document.getElementById('filterProduct');
  products.forEach(p => { const o = document.createElement('option'); o.value = p; o.textContent = p.length > 25 ? p.slice(0,25)+'…' : p; o.title = p; prodSel.appendChild(o); });
  const ageSel = document.getElementById('filterAge');
  ages.forEach(a => { const o = document.createElement('option'); o.value = a; o.textContent = a; ageSel.appendChild(o); });

  const dates = allData.map(d => d.submittedAt).filter(Boolean);
  const minDate = new Date(Math.min(...dates));
  const maxDate = new Date(Math.max(...dates));
  document.getElementById('filterFrom').value = formatDateInput(minDate);
  document.getElementById('filterTo').value = formatDateInput(maxDate);
}

function formatDateInput(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function applyFilters() {
  const prod = document.getElementById('filterProduct').value;
  const age = document.getElementById('filterAge').value;
  const from = document.getElementById('filterFrom').value ? new Date(document.getElementById('filterFrom').value) : null;
  const to = document.getElementById('filterTo').value ? new Date(document.getElementById('filterTo').value + 'T23:59:59') : null;

  filteredData = allData.filter(d => {
    if (prod && d.product !== prod) return false;
    if (age && d.ageGroup !== age) return false;
    if (from && d.submittedAt < from) return false;
    if (to && d.submittedAt > to) return false;
    return true;
  });
  updateAll();
}

function resetFilters() {
  document.getElementById('filterProduct').value = '';
  document.getElementById('filterAge').value = '';
  const dates = allData.map(d => d.submittedAt).filter(Boolean);
  document.getElementById('filterFrom').value = formatDateInput(new Date(Math.min(...dates)));
  document.getElementById('filterTo').value = formatDateInput(new Date(Math.max(...dates)));
  filteredData = [...allData];
  updateAll();
}

// ============================================================
// CALCULATIONS
// ============================================================
function calcNPS(data) {
  if (!data.length) return 0;
  const p = data.filter(d => d.npsBucket === 'Promoter').length;
  const d = data.filter(d => d.npsBucket === 'Detractor').length;
  return Math.round(((p - d) / data.length) * 100);
}

function calcAvg(data, key) {
  const vals = data.map(d => d[key]).filter(v => !isNaN(v));
  return vals.length ? (vals.reduce((a,b)=>a+b,0)/vals.length) : 0;
}

function groupBy(data, keyFn) {
  const m = {};
  data.forEach(d => { const k = keyFn(d); (m[k] = m[k]||[]).push(d); });
  return m;
}

function getWeekKey(d) {
  const dt = new Date(d);
  const day = dt.getDay();
  const diff = dt.getDate() - day + (day === 0 ? -6 : 1);
  const mon = new Date(dt.setDate(diff));
  return formatDateInput(mon);
}

function getMonthKey(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
}

// ============================================================
// KPI UPDATE
// ============================================================
function updateKPIs() {
  const n = filteredData.length;
  const nps = calcNPS(filteredData);
  const sat = calcAvg(filteredData, 'satisfaction');
  const pct = n ? Math.round(filteredData.filter(d=>d.npsBucket==='Promoter').length/n*100) : 0;

  document.getElementById('kpiTotal').textContent = n;
  document.getElementById('kpiTotalSub').textContent = `전체 ${allData.length}건 중`;

  const npsEl = document.getElementById('kpiNps');
  npsEl.textContent = nps;
  npsEl.className = 'value ' + (nps >= 30 ? 'green' : nps >= 0 ? 'amber' : 'red');

  const prom = filteredData.filter(d=>d.npsBucket==='Promoter').length;
  const pass = filteredData.filter(d=>d.npsBucket==='Passive').length;
  const det = filteredData.filter(d=>d.npsBucket==='Detractor').length;
  document.getElementById('kpiNpsSub').textContent = `P:${prom} / N:${pass} / D:${det}`;

  document.getElementById('kpiSat').textContent = sat.toFixed(1);
  document.getElementById('kpiPromoter').textContent = pct + '%';
  document.getElementById('kpiPromoterSub').textContent = `${prom}명 / ${n}명`;
}

// ============================================================
// TAB SWITCHING
// ============================================================
function switchTab(id) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', b.textContent.includes(
    id==='product'?'상품별':id==='period'?'기간별':id==='age'?'연령대별':'도움 요소'
  )));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === 'panel-'+id));
}

// ============================================================
// CHART HELPERS
// ============================================================
function destroyChart(key) {
  if (charts[key]) { charts[key].destroy(); delete charts[key]; }
}

function npsBadge(nps) {
  const cls = nps >= 30 ? 'good' : nps >= 0 ? 'ok' : 'bad';
  return `<span class="nps-badge ${cls}">${nps}</span>`;
}

function truncLabel(s, max) {
  return s.length > max ? s.slice(0, max) + '…' : s;
}

// ============================================================
// PRODUCT TAB
// ============================================================
function updateProductTab() {
  const byProduct = groupBy(filteredData, d => d.product);
  const entries = Object.entries(byProduct)
    .map(([name, rows]) => ({ name, rows, nps: calcNPS(rows), sat: calcAvg(rows,'satisfaction'), count: rows.length }))
    .sort((a,b) => b.count - a.count);

  const labels = entries.map(e => truncLabel(e.name, 20));

  // NPS Bar
  destroyChart('productNps');
  charts.productNps = new Chart(document.getElementById('chartProductNps'), {
    type: 'bar',
    data: {
      labels,
      datasets: [{ label: 'NPS', data: entries.map(e=>e.nps),
        backgroundColor: entries.map(e => e.nps >= 30 ? COLORS.promoter : e.nps >= 0 ? COLORS.passive : COLORS.detractor),
        borderRadius: 4 }]
    },
    options: { indexAxis:'y', responsive:true, plugins:{legend:{display:false}}, scales:{x:{min:-100,max:100}} }
  });

  // Satisfaction Bar
  destroyChart('productSat');
  charts.productSat = new Chart(document.getElementById('chartProductSat'), {
    type: 'bar',
    data: {
      labels,
      datasets: [{ label: '만족도', data: entries.map(e=>+e.sat.toFixed(1)),
        backgroundColor: COLORS.primary, borderRadius: 4 }]
    },
    options: { indexAxis:'y', responsive:true, plugins:{legend:{display:false}}, scales:{x:{min:0,max:5}} }
  });

  // Stacked Distribution
  destroyChart('productDist');
  charts.productDist = new Chart(document.getElementById('chartProductDist'), {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: 'Promoter', data: entries.map(e => Math.round(e.rows.filter(r=>r.npsBucket==='Promoter').length/e.count*100)), backgroundColor: COLORS.promoter },
        { label: 'Passive', data: entries.map(e => Math.round(e.rows.filter(r=>r.npsBucket==='Passive').length/e.count*100)), backgroundColor: COLORS.passive },
        { label: 'Detractor', data: entries.map(e => Math.round(e.rows.filter(r=>r.npsBucket==='Detractor').length/e.count*100)), backgroundColor: COLORS.detractor }
      ]
    },
    options: { indexAxis:'y', responsive:true, scales:{x:{stacked:true,max:100,ticks:{callback:v=>v+'%'}},y:{stacked:true}}, plugins:{tooltip:{callbacks:{label:c=>c.dataset.label+': '+c.raw+'%'}}} }
  });

  // Table
  let html = '<table class="data-table"><thead><tr><th>상품명</th><th>응답수</th><th>NPS</th><th>만족도</th><th>Promoter</th><th>Passive</th><th>Detractor</th></tr></thead><tbody>';
  entries.forEach(e => {
    const p = e.rows.filter(r=>r.npsBucket==='Promoter').length;
    const pa = e.rows.filter(r=>r.npsBucket==='Passive').length;
    const d = e.rows.filter(r=>r.npsBucket==='Detractor').length;
    html += `<tr><td title="${e.name}">${truncLabel(e.name,35)}</td><td>${e.count}</td><td>${npsBadge(e.nps)}</td><td>${e.sat.toFixed(1)}</td><td>${p} (${Math.round(p/e.count*100)}%)</td><td>${pa} (${Math.round(pa/e.count*100)}%)</td><td>${d} (${Math.round(d/e.count*100)}%)</td></tr>`;
  });
  html += '</tbody></table>';
  document.getElementById('productTableWrap').innerHTML = html;
}

// ============================================================
// PERIOD TAB
// ============================================================
function setPeriod(p, btn) {
  currentPeriod = p;
  document.querySelectorAll('.period-toggle button').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  updatePeriodTab();
}

function updatePeriodTab() {
  const keyFn = currentPeriod === 'week'
    ? d => getWeekKey(d.submittedAt)
    : d => getMonthKey(d.submittedAt);

  const byPeriod = groupBy(filteredData.filter(d=>d.submittedAt), keyFn);
  const sortedKeys = Object.keys(byPeriod).sort();
  const labels = sortedKeys.map(k => currentPeriod==='week' ? k.slice(5) + '주' : k);

  // NPS Line
  destroyChart('periodNps');
  charts.periodNps = new Chart(document.getElementById('chartPeriodNps'), {
    type: 'line',
    data: { labels, datasets: [{ label:'NPS', data: sortedKeys.map(k=>calcNPS(byPeriod[k])),
      borderColor: COLORS.primary, backgroundColor: COLORS.primary+'20', fill:true, tension:.3, pointRadius:4 }] },
    options: { responsive:true, plugins:{legend:{display:false}}, scales:{y:{min:-100,max:100}} }
  });

  // Satisfaction Line
  destroyChart('periodSat');
  charts.periodSat = new Chart(document.getElementById('chartPeriodSat'), {
    type: 'line',
    data: { labels, datasets: [{ label:'만족도', data: sortedKeys.map(k=>+calcAvg(byPeriod[k],'satisfaction').toFixed(1)),
      borderColor: '#06B6D4', backgroundColor: '#06B6D420', fill:true, tension:.3, pointRadius:4 }] },
    options: { responsive:true, plugins:{legend:{display:false}}, scales:{y:{min:0,max:5}} }
  });

  // Count Bar
  destroyChart('periodCount');
  charts.periodCount = new Chart(document.getElementById('chartPeriodCount'), {
    type: 'bar',
    data: { labels, datasets: [{ label:'응답 수', data: sortedKeys.map(k=>byPeriod[k].length),
      backgroundColor: COLORS.primaryLight, borderRadius:4 }] },
    options: { responsive:true, plugins:{legend:{display:false}} }
  });

  // Stacked Distribution
  destroyChart('periodDist');
  charts.periodDist = new Chart(document.getElementById('chartPeriodDist'), {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label:'Promoter', data: sortedKeys.map(k=>byPeriod[k].filter(d=>d.npsBucket==='Promoter').length), backgroundColor: COLORS.promoter },
        { label:'Passive', data: sortedKeys.map(k=>byPeriod[k].filter(d=>d.npsBucket==='Passive').length), backgroundColor: COLORS.passive },
        { label:'Detractor', data: sortedKeys.map(k=>byPeriod[k].filter(d=>d.npsBucket==='Detractor').length), backgroundColor: COLORS.detractor }
      ]
    },
    options: { responsive:true, scales:{x:{stacked:true},y:{stacked:true}} }
  });
}

// ============================================================
// AGE TAB
// ============================================================
function updateAgeTab() {
  const byAge = groupBy(filteredData, d => d.ageGroup);
  const ageOrder = ['20대','30대','40대','50대','60대','70대','기타'];
  const keys = ageOrder.filter(k => byAge[k]);

  destroyChart('ageNps');
  charts.ageNps = new Chart(document.getElementById('chartAgeNps'), {
    type: 'bar',
    data: { labels: keys, datasets: [{ label:'NPS', data: keys.map(k=>calcNPS(byAge[k])),
      backgroundColor: keys.map(k => { const n=calcNPS(byAge[k]); return n>=30?COLORS.promoter:n>=0?COLORS.passive:COLORS.detractor; }),
      borderRadius:4 }] },
    options: { responsive:true, plugins:{legend:{display:false}}, scales:{y:{min:-100,max:100}} }
  });

  destroyChart('ageSat');
  charts.ageSat = new Chart(document.getElementById('chartAgeSat'), {
    type: 'bar',
    data: { labels: keys, datasets: [{ label:'만족도', data: keys.map(k=>+calcAvg(byAge[k],'satisfaction').toFixed(1)),
      backgroundColor: '#06B6D4', borderRadius:4 }] },
    options: { responsive:true, plugins:{legend:{display:false}}, scales:{y:{min:0,max:5}} }
  });

  destroyChart('ageDist');
  charts.ageDist = new Chart(document.getElementById('chartAgeDist'), {
    type: 'bar',
    data: {
      labels: keys,
      datasets: [
        { label:'Promoter', data: keys.map(k=>byAge[k].filter(d=>d.npsBucket==='Promoter').length), backgroundColor: COLORS.promoter },
        { label:'Passive', data: keys.map(k=>byAge[k].filter(d=>d.npsBucket==='Passive').length), backgroundColor: COLORS.passive },
        { label:'Detractor', data: keys.map(k=>byAge[k].filter(d=>d.npsBucket==='Detractor').length), backgroundColor: COLORS.detractor }
      ]
    },
    options: { responsive:true, scales:{x:{stacked:true},y:{stacked:true}} }
  });
}

// ============================================================
// FACTORS TAB
// ============================================================
function updateFactorsTab() {
  // Frequency
  const freqMap = {};
  filteredData.forEach(d => d.factors.forEach(f => { freqMap[f] = (freqMap[f]||0)+1; }));
  const freqEntries = Object.entries(freqMap).sort((a,b)=>b[1]-a[1]);
  const fLabels = freqEntries.map(([k])=> FACTOR_LABELS[k]||k);
  const fValues = freqEntries.map(([,v])=>v);

  destroyChart('factorsFreq');
  charts.factorsFreq = new Chart(document.getElementById('chartFactorsFreq'), {
    type: 'bar',
    data: { labels: fLabels, datasets: [{ label:'선택 횟수', data: fValues,
      backgroundColor: COLORS.palette.slice(0, fLabels.length), borderRadius:4 }] },
    options: { indexAxis:'y', responsive:true, plugins:{legend:{display:false}} }
  });

  // Avg NPS per factor
  const factorNps = {};
  freqEntries.forEach(([k]) => {
    const rows = filteredData.filter(d => d.factors.includes(k));
    factorNps[k] = calcNPS(rows);
  });

  destroyChart('factorsNps');
  charts.factorsNps = new Chart(document.getElementById('chartFactorsNps'), {
    type: 'bar',
    data: { labels: fLabels, datasets: [{ label:'NPS', data: freqEntries.map(([k])=>factorNps[k]),
      backgroundColor: freqEntries.map(([k]) => factorNps[k]>=30?COLORS.promoter:factorNps[k]>=0?COLORS.passive:COLORS.detractor),
      borderRadius:4 }] },
    options: { indexAxis:'y', responsive:true, plugins:{legend:{display:false}}, scales:{x:{min:-100,max:100}} }
  });

  // Product x Factor table
  const byProduct = groupBy(filteredData, d => d.product);
  const topProducts = Object.entries(byProduct).sort((a,b)=>b[1].length-a[1].length).slice(0, 10);
  let html = '<table class="data-table"><thead><tr><th>상품명</th><th>응답수</th><th>Top 1</th><th>Top 2</th><th>Top 3</th></tr></thead><tbody>';
  topProducts.forEach(([name, rows]) => {
    const fm = {};
    rows.forEach(d => d.factors.forEach(f => { fm[f]=(fm[f]||0)+1; }));
    const top3 = Object.entries(fm).sort((a,b)=>b[1]-a[1]).slice(0,3);
    const cells = top3.map(([k,v]) => `${FACTOR_LABELS[k]||k} (${v})`);
    while(cells.length < 3) cells.push('-');
    html += `<tr><td title="${name}">${truncLabel(name,30)}</td><td>${rows.length}</td><td>${cells[0]}</td><td>${cells[1]}</td><td>${cells[2]}</td></tr>`;
  });
  html += '</tbody></table>';
  document.getElementById('factorsTableWrap').innerHTML = html;
}

// ============================================================
// MASTER UPDATE
// ============================================================
function updateAll() {
  updateKPIs();
  updateProductTab();
  updatePeriodTab();
  updateAgeTab();
  updateFactorsTab();
}

// ============================================================
// INIT
// ============================================================
initFilters();
updateAll();
</script>
</body>
</html>
