<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>플랫폼 백오피스 — 개념 가이드</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#F8FAFC;--card:#fff;--text:#0F172A;--muted:#64748B;--light:#94A3B8;
  --border:#E2E8F0;--blue-900:#1E3A5F;--blue-600:#2563EB;--blue-400:#60A5FA;
  --blue-200:#BFDBFE;--blue-50:#EFF6FF;--red:#EF4444;--red-50:#FEF2F2;
  --purple:#8B5CF6;--purple-50:#F5F3FF;--green:#10B981;--amber:#F59E0B;
  --shadow:0 1px 3px rgba(0,0,0,.06);--shadow-lg:0 8px 24px rgba(0,0,0,.1);
  --radius:10px;
}
body{font-family:'Pretendard','Segoe UI','Malgun Gothic',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column}

/* ===== Header ===== */
header{padding:16px 32px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);background:#fff;flex-shrink:0}
.logo{width:32px;height:32px;background:var(--red);border-radius:7px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:10px}
header h1{font-size:15px;font-weight:700}
header span{font-size:12px;color:var(--muted);margin-left:auto}

/* ===== Main ===== */
main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 32px;position:relative;overflow:hidden}

/* ===== Step Message ===== */
.step-msg{text-align:center;margin-bottom:32px;min-height:56px;transition:all .4s}
.step-msg h2{font-size:22px;font-weight:800;margin-bottom:4px;transition:all .4s}
.step-msg p{font-size:14px;color:var(--muted);transition:all .4s}

/* ===== Board ===== */
.board{position:relative;display:flex;align-items:center;justify-content:center;gap:0;transition:all .6s cubic-bezier(.4,0,.2,1)}

/* ===== Wrappers ===== */
.biz-wrap{
  border:2.5px dashed var(--purple);border-radius:20px;padding:32px 28px 24px;
  position:relative;background:rgba(139,92,246,.03);
  opacity:0;transform:scale(.97);transition:all .5s cubic-bezier(.4,0,.2,1);pointer-events:none;
}
.biz-wrap.show{opacity:1;transform:scale(1);pointer-events:auto}
.biz-wrap>.wrap-label{
  position:absolute;top:-15px;left:50%;transform:translateX(-50%);
  background:var(--purple);color:#fff;padding:5px 22px;border-radius:20px;
  font-size:13px;font-weight:700;white-space:nowrap;
}
.prod-wrap{
  border:2.5px solid var(--red);border-radius:16px;padding:28px 24px 20px;
  position:relative;background:rgba(239,68,68,.02);
  opacity:0;transform:scale(.97);transition:all .5s cubic-bezier(.4,0,.2,1);pointer-events:none;
}
.prod-wrap.show{opacity:1;transform:scale(1);pointer-events:auto}
.prod-wrap>.wrap-label{
  position:absolute;top:-14px;left:50%;transform:translateX(-50%);
  background:var(--red);color:#fff;padding:4px 20px;border-radius:20px;
  font-size:13px;font-weight:700;white-space:nowrap;
}
/* When wrappers are hidden, remove spacing/borders visually */
.biz-wrap:not(.show){border-color:transparent;background:transparent;padding:32px 28px 24px}
.prod-wrap:not(.show){border-color:transparent;background:transparent;padding:28px 24px 20px}

/* ===== Tree ===== */
.tree{display:flex;flex-direction:column;align-items:center}
.tree-row{display:flex;align-items:flex-start;justify-content:center;position:relative}
.tree-vline{width:2px;height:22px;background:#CBD5E1;margin:0 auto}
.tree-branch{display:flex;position:relative;padding-top:22px}
.tree-branch::before{content:'';position:absolute;top:0;left:50%;width:2px;height:22px;background:#CBD5E1}
.tree-item{display:flex;flex-direction:column;align-items:center;padding:0 10px;position:relative}
.tree-branch.multi>.tree-item::before{content:'';position:absolute;top:0;height:2px;background:#CBD5E1}
.tree-branch.multi>.tree-item:first-child::before{left:50%;right:0;width:calc(50% + 10px)}
.tree-branch.multi>.tree-item:last-child::before{right:50%;left:0;width:calc(50% + 10px)}
.tree-branch.multi>.tree-item:not(:first-child):not(:last-child)::before{left:-10px;right:-10px;width:calc(100% + 20px)}
.tree-item::after{content:'';position:absolute;top:0;left:50%;width:2px;height:22px;background:#CBD5E1;transform:translateX(-50%)}

/* ===== Nodes ===== */
.nd{
  padding:10px 22px;border-radius:var(--radius);font-size:13px;font-weight:600;
  cursor:pointer;transition:all .25s;text-align:center;white-space:nowrap;
  box-shadow:var(--shadow);position:relative;user-select:none;
}
.nd:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.nd:active{transform:scale(.97)}
.nd-lec{background:var(--blue-900);color:#fff;font-size:15px;padding:12px 30px}
.nd-cur{background:var(--blue-600);color:#fff}
.nd-cur.dim{background:#B0B8C4;opacity:.55}
.nd-chp{background:var(--blue-400);color:#fff}
.nd-les{background:var(--blue-200);color:#1E40AF;font-weight:500;font-size:12px;padding:8px 16px}
.nd-adn{background:var(--purple);color:#fff}
.nd-prd{background:var(--red);color:#fff;font-size:15px;padding:12px 30px}
.nd-mbr{background:var(--text);color:#fff;border-radius:50%;width:52px;height:52px;padding:0;display:flex;align-items:center;justify-content:center}
.nd-enr{background:#fff;color:var(--red);border:2px solid var(--red);font-size:14px;padding:14px 22px}

/* ===== Stepped visibility ===== */
[data-step]{opacity:0;transform:translateY(12px);transition:opacity .45s cubic-bezier(.4,0,.2,1),transform .45s cubic-bezier(.4,0,.2,1);pointer-events:none}
[data-step].vis{opacity:1;transform:translateY(0);pointer-events:auto}
[data-step].vis-delay-1{transition-delay:.08s}
[data-step].vis-delay-2{transition-delay:.16s}
[data-step].vis-delay-3{transition-delay:.24s}
[data-step].vis-delay-4{transition-delay:.32s}
/* dim nodes */
[data-step].dim-node{opacity:.15!important}

/* ===== Flow (commerce) ===== */
.flow{display:flex;align-items:center;gap:20px;margin-left:36px}
.flow-arr{display:flex;flex-direction:column;align-items:center;gap:2px;flex-shrink:0}
.flow-arr .arrow{font-size:28px;color:var(--red);line-height:1}
.flow-arr .label{font-size:11px;color:var(--muted);font-weight:600;white-space:nowrap}
.mbr-wrap{display:flex;flex-direction:column;align-items:center;gap:4px}
.mbr-wrap .mbr-label{font-size:13px;font-weight:600}
.enr-list{list-style:none;padding:0;margin:6px 0 0}
.enr-list li{font-size:11px;color:var(--muted);padding:2px 0;display:flex;align-items:center;gap:5px}
.enr-list li::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--red);flex-shrink:0}

/* ===== Connector: product → flow ===== */
.flow-connector{width:40px;display:flex;align-items:center;justify-content:center;position:relative}
.flow-connector::before{content:'';width:100%;height:2px;background:var(--red);position:absolute}
.flow-connector::after{content:'';width:0;height:0;border-top:6px solid transparent;border-bottom:6px solid transparent;border-left:8px solid var(--red);position:absolute;right:0}

/* ===== Nav ===== */
.step-nav{display:flex;align-items:center;gap:16px;margin-top:36px;flex-shrink:0}
.step-nav button{
  width:40px;height:40px;border:1px solid var(--border);border-radius:50%;
  background:#fff;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;
  transition:all .2s;color:var(--muted);
}
.step-nav button:hover:not(:disabled){background:var(--blue-50);border-color:var(--blue-600);color:var(--blue-600)}
.step-nav button:disabled{opacity:.3;cursor:default}
.step-dots{display:flex;gap:6px}
.step-dot{
  width:8px;height:8px;border-radius:50%;background:var(--border);
  cursor:pointer;transition:all .3s;
}
.step-dot.active{background:var(--blue-600);width:28px;border-radius:4px}

/* ===== Popover ===== */
.pop{
  position:fixed;z-index:999;background:#fff;border:1px solid var(--border);
  border-radius:var(--radius);padding:14px 18px;box-shadow:var(--shadow-lg);
  max-width:240px;opacity:0;pointer-events:none;transition:opacity .2s;
}
.pop.show{opacity:1;pointer-events:auto}
.pop h4{font-size:14px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.pop h4 .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.pop p{font-size:12px;color:var(--muted);line-height:1.6}

/* ===== Keyboard hint ===== */
.kbd-hint{position:fixed;bottom:16px;right:24px;font-size:11px;color:var(--light);display:flex;gap:12px}
.kbd{background:var(--border);padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600}

/* ===== Responsive ===== */
@media(max-width:960px){
  .board{transform:scale(.8);transform-origin:center center}
  .flow{margin-left:20px;gap:12px}
}
</style>
</head>
<body>

<header>
  <div class="logo">SP</div>
  <h1>플랫폼 백오피스</h1>
  <span>개념 가이드</span>
</header>

<main>
  <!-- Step Message -->
  <div class="step-msg">
    <h2 id="stepTitle">콘텐츠의 구조</h2>
    <p id="stepDesc">강의 안에는 교육과정, 챕터, 수업이 계층적으로 구성됩니다</p>
  </div>

  <!-- Diagram Board -->
  <div class="board" id="board">

    <!-- Business Wrapper (step 4) -->
    <div class="biz-wrap" id="bizWrap">
      <div class="wrap-label">사업</div>

      <!-- Inner: product + flow side by side -->
      <div style="display:flex;align-items:center">

        <!-- Product Wrapper (step 2) -->
        <div class="prod-wrap" id="prodWrap">
          <div class="wrap-label">상품</div>

          <!-- Lecture Tree (step 1) -->
          <div class="tree">
            <!-- L1: 강의 -->
            <div class="nd nd-lec" data-step="1" data-key="lecture" onclick="pop(this,'lecture')">강의</div>
            <div class="tree-vline" data-step="1" class="vis-delay-1"></div>

            <!-- L2: 교육과정 -->
            <div class="tree-branch multi" data-step="1">
              <div class="tree-item" style="padding:0 14px">
                <div class="nd nd-cur" data-key="curriculum" onclick="pop(this,'curriculum')">교육과정 v.1</div>
                <div class="tree-vline"></div>
                <!-- L3: 챕터 + 부가서비스 -->
                <div class="tree-branch multi">
                  <div class="tree-item" style="padding:0 8px">
                    <div class="nd nd-chp" data-key="chapter" onclick="pop(this,'chapter')">챕터 1</div>
                    <div class="tree-vline"></div>
                    <!-- L4: 수업 -->
                    <div class="tree-branch multi">
                      <div class="tree-item" style="padding:0 5px"><div class="nd nd-les" data-key="lesson" onclick="pop(this,'lesson')">수업 1</div></div>
                      <div class="tree-item" style="padding:0 5px"><div class="nd nd-les" data-key="lesson" onclick="pop(this,'lesson')">수업 2</div></div>
                      <div class="tree-item" style="padding:0 5px"><div class="nd nd-les" data-key="lesson" onclick="pop(this,'lesson')">수업 3</div></div>
                    </div>
                  </div>
                  <div class="tree-item" style="padding:0 8px">
                    <div class="nd nd-chp" data-key="chapter" onclick="pop(this,'chapter')">챕터 2</div>
                  </div>
                  <div class="tree-item" style="padding:0 8px">
                    <div class="nd nd-chp dim" data-key="chapter" onclick="pop(this,'chapter')" style="opacity:.5">챕터 3 ...</div>
                  </div>
                  <div class="tree-item" style="padding:0 8px">
                    <div class="nd nd-adn" data-key="addon" onclick="pop(this,'addon')">부가서비스</div>
                  </div>
                </div>
              </div>
              <div class="tree-item" style="padding:0 10px">
                <div class="nd nd-cur dim" data-key="curriculum" onclick="pop(this,'curriculum')">교육과정 v.2</div>
              </div>
              <div class="tree-item" style="padding:0 10px">
                <div class="nd nd-cur dim" data-key="curriculum" onclick="pop(this,'curriculum')" style="opacity:.35">v.3 ...</div>
              </div>
            </div>
          </div>
        </div><!-- /prod-wrap -->

        <!-- Flow Connector (step 3) -->
        <div class="flow-connector" data-step="3"></div>

        <!-- Commerce Flow (step 3) -->
        <div class="flow" data-step="3">
          <div class="flow-arr">
            <div class="label">판매 · 지급</div>
          </div>
          <div class="mbr-wrap">
            <div class="nd nd-mbr" data-key="member" onclick="pop(this,'member')">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="#fff"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
            </div>
            <div class="mbr-label">회원</div>
          </div>
          <div class="flow-arr">
            <div class="arrow">→</div>
          </div>
          <div>
            <div class="nd nd-enr" data-key="enrollment" onclick="pop(this,'enrollment')" style="display:flex;flex-direction:column;align-items:flex-start;text-align:left">
              <strong style="font-size:14px;margin-bottom:6px">수강권</strong>
              <ul class="enr-list">
                <li>교육과정 접근 권한</li>
                <li>수강기간</li>
                <li>소장기간</li>
                <li>부가서비스</li>
                <li>수료 시 보상</li>
              </ul>
            </div>
          </div>
        </div>

      </div>
    </div><!-- /biz-wrap -->

  </div><!-- /board -->

  <!-- Step Navigation -->
  <div class="step-nav">
    <button id="btnPrev" onclick="go(-1)" disabled>←</button>
    <div class="step-dots" id="dots"></div>
    <button id="btnNext" onclick="go(1)">→</button>
  </div>
</main>

<!-- Popover -->
<div class="pop" id="popover">
  <h4><span class="dot" id="popDot"></span><span id="popTitle"></span></h4>
  <p id="popDesc"></p>
</div>

<div class="kbd-hint">
  <span><span class="kbd">←</span> <span class="kbd">→</span> 단계 이동</span>
  <span>노드를 클릭하면 설명을 볼 수 있어요</span>
</div>

<script>
// ===== Step Data =====
const steps = [
  {title:'콘텐츠의 구조', desc:'강의 안에는 교육과정, 챕터, 수업이 계층적으로 구성됩니다'},
  {title:'상품으로 포장', desc:'강의를 상품으로 감싸면 판매할 수 있는 단위가 됩니다'},
  {title:'판매하면 수강권이 생겨요', desc:'상품을 판매하거나 지급하면 회원에게 수강권이 발급됩니다'},
  {title:'사업이 모든 것을 관리해요', desc:'사업은 여러 상품과 강의를 묶어 관리하는 최상위 단위입니다'},
];
let cur = 0;

// ===== Popover Data =====
const info = {
  lecture: {color:'#1E3A5F', title:'강의', desc:'교육과정들의 모음이자, 상품을 만들기 위한 콘텐츠 재료입니다.'},
  curriculum:{color:'#2563EB',title:'교육과정',desc:"강의의 '버전' 개념. 여러 챕터와 수업으로 구성되며, 수강권이 참조하는 학습 단위예요."},
  chapter:  {color:'#60A5FA',title:'챕터',desc:"연속성 있는 수업들을 묶는 단위. '1주차','2주차' 등. 선택 사항이에요."},
  lesson:   {color:'#93C5FD',title:'수업',desc:'콘텐츠의 최소 단위. 영상·문서·퀴즈·실습 4가지 유형이 있어요.'},
  addon:    {color:'#8B5CF6',title:'부가서비스',desc:'교육과정에 추가로 제공되는 서비스. 커뮤니티, 멘토링 등이 포함될 수 있어요.'},
  product:  {color:'#EF4444',title:'상품',desc:'강의를 판매 가능하게 포장한 단위. 가격, 할인, 판매 기간 등을 관리해요.'},
  member:   {color:'#0F172A',title:'회원',desc:'상품을 구매하거나 지급받는 사용자예요.'},
  enrollment:{color:'#EF4444',title:'수강권',desc:'회원이 교육과정에 접근할 수 있는 권한. 수강/소장기간, 부가서비스 등이 포함돼요.'},
  business: {color:'#8B5CF6',title:'사업',desc:'여러 상품과 강의를 묶어 관리하는 최상위 비즈니스 단위. 매출·정산·권한의 기준이 돼요.'},
};

// ===== Init =====
function init(){
  // Create dots
  const dotsEl = document.getElementById('dots');
  steps.forEach((_,i)=>{
    const d = document.createElement('div');
    d.className = 'step-dot'+(i===0?' active':'');
    d.onclick = ()=>goTo(i);
    dotsEl.appendChild(d);
  });
  // Set step 1 elements visible
  applyStep(0);
}

function applyStep(idx){
  const s = steps[idx];
  // Update text with fade
  const titleEl = document.getElementById('stepTitle');
  const descEl = document.getElementById('stepDesc');
  titleEl.style.opacity='0'; descEl.style.opacity='0';
  setTimeout(()=>{
    titleEl.textContent = s.title;
    descEl.textContent = s.desc;
    titleEl.style.opacity='1'; descEl.style.opacity='1';
  },200);

  // Step 1: tree nodes
  const treeEls = document.querySelectorAll('[data-step="1"]');
  treeEls.forEach((el,i)=>{el.classList.toggle('vis',idx>=0)});
  // Also make tree branch containers visible (they don't have data-step)
  document.querySelectorAll('.tree-branch, .tree-vline, .tree-item').forEach(el=>{
    el.style.opacity = idx>=0?'1':'0';
    el.style.transition = 'opacity .4s';
  });

  // Step 2: product wrapper
  document.getElementById('prodWrap').classList.toggle('show',idx>=1);

  // Step 3: commerce flow
  document.querySelectorAll('[data-step="3"]').forEach(el=>el.classList.toggle('vis',idx>=2));

  // Step 4: business wrapper
  document.getElementById('bizWrap').classList.toggle('show',idx>=3);

  // Update dots
  document.querySelectorAll('.step-dot').forEach((d,i)=>{
    d.classList.toggle('active',i===idx);
  });

  // Update buttons
  document.getElementById('btnPrev').disabled = idx===0;
  document.getElementById('btnNext').disabled = idx===steps.length-1;

  // Hide popover
  hidePop();
}

function go(dir){goTo(cur+dir)}
function goTo(idx){
  if(idx<0||idx>=steps.length)return;
  cur=idx;
  applyStep(cur);
}

// ===== Popover =====
const popEl = document.getElementById('popover');
function pop(node, key){
  const d = info[key]; if(!d)return;
  document.getElementById('popDot').style.background = d.color;
  document.getElementById('popTitle').textContent = d.title;
  document.getElementById('popDesc').textContent = d.desc;

  const r = node.getBoundingClientRect();
  let top = r.top - popEl.offsetHeight - 10;
  let left = r.left + r.width/2 - 120;
  if(top<8) top = r.bottom + 10;
  if(left<8) left = 8;
  if(left+240>window.innerWidth) left = window.innerWidth - 248;
  popEl.style.top = top+'px';
  popEl.style.left = left+'px';
  popEl.classList.add('show');

  event.stopPropagation();
}
function hidePop(){popEl.classList.remove('show')}
document.addEventListener('click',e=>{
  if(!e.target.closest('.nd')&&!e.target.closest('.pop'))hidePop();
});

// ===== Keyboard =====
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight')go(1);
  if(e.key==='ArrowLeft')go(-1);
  if(e.key==='Escape')hidePop();
  if(e.key>='1'&&e.key<='4')goTo(+e.key-1);
});

init();
</script>
</body>
</html>
